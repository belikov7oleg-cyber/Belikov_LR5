<!-- БЛОК 1: ОБЪЯВЛЕНИЕ ТИПА ДОКУМЕНТА И МЕТАДАННЫЕ                         -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roboflow + Replit Example</title>
<!--БЛОК 2: ПОДКЛЮЧЕНИЕ ВНЕШНИХ БИБЛИОТЕК И РЕСУРСОВ-->
  <!-- inferencejs – библиотека для запуска моделей компьютерного зрения в браузере -->
  <script src="https://cdn.jsdelivr.net/npm/inferencejs"></script>
  <!-- Подключение локальных стилей CSS -->
  <link rel="stylesheet" href="/static/styles.css" />
<!--БЛОК 3: КОНФИГУРАЦИЯ МОДЕЛИ (НАСТРОЙКИ ПО УМОЛЧАНИЮ)  -->
  <script>
    // Публичный ключ доступа к Roboflow API
    var publishable_key = "rf_l8GLzZgLQL6gZLAin1iU";
    // Конфигурационные параметры модели
    const CONFIDENCE_THRESHOLD = 0.1;  // ДОСТОВЕРНОСТЬ ПРОГНОЗА для отображения предсказаний
    const MODEL_NAME = "microsoft-coco";      // Название модели (COCO – 80 классов объектов)
    const MODEL_VERSION = 9;                  // Версия модели
  </script>
</head>
<!-- БЛОК 4: BODY – ОТОБРАЖАЕМАЯ ЧАСТЬ СТРАНИЦЫ                             -->
<body>
  <main>
    <!-- Заголовок и описание -->
    <h1>Roboflow + Replit Web Example 🚀</h1>
    <p>Roboflow enables you to build and run custom computer vision models...</p>
    <!-- Элемент для отображения статуса загрузки -->
    <p id="loading">Loading...</p>
<!-- БЛОК 5: ВИДЖЕТ КОМПЬЮТЕРНОГО ЗРЕНИЯ (CANVAS)                         -->
    <!-- Canvas – элемент, на котором отрисовываются bounding boxes -->
    <section class="infer-widget">
      <canvas width="640" height="480" id="video_canvas"></canvas>
    </section>
<!-- БЛОК 6: ЭЛЕМЕНТЫ УПРАВЛЕНИЯ (ПОЛЗУНОК НАСТРОЙКИ)                     -->
    <section id="settings">
      <label for="confidence">Prediction Confidence %</label><br>
      <!-- Ползунок для регулировки ДОСТОВЕРНОСТИ ПРОГНОЗА предсказаний -->
      <input type="range" min="1" max="100" value="60" class="slider" id="confidence">
    </section>
<!-- БЛОК 7: ССЫЛКИ-КНОПКИ ДЛЯ ДОПОЛНИТЕЛЬНЫХ ДЕЙСТВИЙ                    -->
    <section class="links">
      <a href="https://blog.roboflow.com/getting-started-with-roboflow/" class="styled-button">Build a Custom Model</a>
      <a href="https://universe.roboflow.com" class="styled-button styled-button-turqouise">Explore 50k+ Models and Datasets</a>
    </section>
<!-- БЛОК 8: ПОДКЛЮЧЕНИЕ КЛИЕНТСКОЙ ЛОГИКИ                                 -->
    <script src="/static/script.js"></script>
  </main>
</body>
</html>
